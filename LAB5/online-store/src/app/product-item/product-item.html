<div class="product-card">
  <img [src]="product.image" [alt]="product.name" class="product-image">

  <h3>{{ product.name }}</h3>
  <p class="description">{{ product.description }}</p>

  <div class="info">
    <span class="price">{{ product.price }} ₸</span>
    <span class="rating">⭐ {{ product.rating }}</span>
  </div>

  <div class="stats">
    <span class="likes-count">❤️ {{ product.likes }}</span>
  </div>

  <div class="actions">
    <button (click)="like()" class="btn-like">Like</button>
    <button (click)="onDelete()" class="btn-delete">🗑️ Delete</button>
  </div>

  <div class="share-buttons">
    <button (click)="share('whatsapp')" class="btn-share wa">WA</button>
    <button (click)="share('telegram')" class="btn-share tg">TG</button>
    <a [href]="product.link" target="_blank" class="btn-kaspi">View on Kaspi</a>
  </div>
</div>
